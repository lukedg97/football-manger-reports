  <style>
    :root {
      --bg: #070707; --panel: #111111; --panel-2: #161616;
      --text: #f0ede0; --muted: #888070; --muted-2: #5a5650;
      --accent: #F6E216; --accent-dim: rgba(246,226,22,0.14);
      --red: #f87171; --green: #4ade80; --line: rgba(246,226,22,0.10);
      --line-hard: rgba(246,226,22,0.22);
      --font-body: 'DM Sans', sans-serif; --font-mono: 'IBM Plex Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body);
           font-size: 14px; line-height: 1.6; padding: 32px 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-input {
      background: var(--panel); border: 1px solid var(--line-hard); border-radius: 8px;
      color: var(--text); font-size: 13px; padding: 6px 12px; outline: none; width: 200px;
    }
    .filter-input::placeholder { color: var(--muted); }
    .count { color: var(--muted); font-size: 13px; }
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--panel-2); color: var(--muted); font-size: 11px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; padding: 10px 12px;
      cursor: pointer; white-space: nowrap; user-select: none; text-align: left;
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 1;
    }
    thead th:hover { color: var(--text); }
    thead th.sorted-asc::after { content: ' ▲'; color: var(--accent); }
    thead th.sorted-desc::after { content: ' ▼'; color: var(--accent); }
    tbody tr { border-bottom: 1px solid var(--line); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--panel); }
    td { padding: 9px 12px; white-space: nowrap; }
    td.num { font-family: var(--font-mono); font-size: 13px; text-align: right; }
    td.name-cell a { color: var(--text); text-decoration: none; font-weight: 500; }
    td.name-cell a:hover { color: var(--accent); }
    td.name-cell span.no-report { color: var(--muted); }
    .tag {
      display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .03em;
      padding: 2px 7px; border-radius: 4px; border: 1px solid var(--line-hard);
      color: var(--muted); background: var(--panel-2);
    }
    .tag.primary { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
    .bar-cell { min-width: 80px; }
    .mini-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 3px; }
    .mini-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  </style>

: 10.67, "Anchor": 9.5, "Engine": 9.4, "Target": 10.0, "Linker": 8.0}, "secondaries": [], "report_file": "Noah_Valley_archetype.html", "has_report": true}, {"name": "Rene Kriwak", "slug": "Rene_Kriwak", "position": "ST (C)", "pos_group": "ST", "age": "27", "primary": "Target", "fit": 14.17, "scores": {"Creator": 10.33, "Finisher": 12.67, "Ball Carrier": 9.33, "Runner": 12.0, "Presser": 10.5, "Anchor": 8.17, "Engine": 11.2, "Target": 14.17, "Linker": 11.2}, "secondaries": [], "report_file": "Rene_Kriwak_archetype.html", "has_report": true}, {"name": "Tim Maciejewski", "slug": "Tim_Maciejewski", "position": "AM (R)", "pos_group": "Winger", "age": "25", "primary": "Engine", "fit": 11.8, "scores": {"Creator": 9.17, "Finisher": 9.5, "Ball Carrier": 11.67, "Runner": 10.6, "Presser": 10.0, "Anchor": 7.17, "Engine": 11.8, "Target": 9.0, "Linker": 9.6}, "secondaries": [], "report_file": "Tim_Maciejewski_archetype.html", "has_report": true}, {"name": "Valmir Sulejmani", "slug": "Valmir_Sulejmani", "position": "ST (C)", "pos_group": "ST", "age": "30", "primary": "Creator / Linker", "fit": 11.47, "scores": {"Creator": 11.33, "Finisher": 11.33, "Ball Carrier": 11.67, "Runner": 11.4, "Presser": 11.83, "Anchor": 8.17, "Engine": 11.4, "Target": 10.5, "Linker": 11.6}, "secondaries": [], "report_file": "Valmir_Sulejmani_archetype.html", "has_report": true}, {"name": "Yanis Chahid", "slug": "Yanis_Chahid", "position": "M (C)", "pos_group": "CM", "age": "21", "primary": "Creator / Linker", "fit": 12.85, "scores": {"Creator": 12.5, "Finisher": 10.83, "Ball Carrier": 10.83, "Runner": 11.8, "Presser": 11.0, "Anchor": 10.67, "Engine": 11.0, "Target": 9.33, "Linker": 13.2}, "secondaries": [], "report_file": "Yanis_Chahid_archetype.html", "has_report": true}, {"name": "Yannik Möker", "slug": "Yannik_Möker", "position": "M (C)", "pos_group": "CM", "age": "27", "primary": "Creator / Linker", "fit": 12.08, "scores": {"Creator": 12.17, "Finisher": 11.17, "Ball Carrier": 11.67, "Runner": 11.6, "Presser": 12.0, "Anchor": 10.67, "Engine": 11.2, "Target": 11.0, "Linker": 12.0}, "secondaries": ["Presser"], "report_file": "Yannik_Möker_archetype.html", "has_report": true}];
const ARCH_ORDER = ["Creator", "Linker", "Finisher", "Ball Carrier", "Runner", "Presser", "Anchor", "Engine", "Target"];
const POS_ORDER = ["GK", "CB", "FB/WB", "DM", "CM", "Winger", "AM", "ST", "Other"];
const ACCENT = '#F6E216';

// Column definitions: [key, label, type]  type: name|pos|tag|num|bar
const COLS = [
  ['name',    'Player',      'name'],
  ['pos_group','Position',   'pos'],
  ['age',     'Age',         'num'],
  ['primary', 'Primary',     'tag'],
  ['fit',     'Primary Fit Score', 'bar'],
  ...ARCH_ORDER.map(a => [a, a, 'bar']),
];

let sortCol = 'fit', sortDir = -1;  // default: fit score descending

function getVal(row, key) {
  if (key === 'fit') return row.fit;
  if (ARCH_ORDER.includes(key)) return row.scores[key] ?? 0;
  if (key === 'pos_group') return POS_ORDER.indexOf(row.pos_group);
  if (key === 'primary') return ARCH_ORDER.indexOf(row.primary.split(' / ')[0]);
  if (key === 'age') return parseInt(row.age) || 0;
  return (row[key] || '').toString().toLowerCase();
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    const av = getVal(a, sortCol), bv = getVal(b, sortCol);
    return typeof av === 'number'
      ? (av - bv) * sortDir
      : av.localeCompare(bv) * sortDir;
  });
}

function renderBar(val) {
  const pct = Math.round((val / 20) * 100);
  return `<td class="num bar-cell"><span>${val.toFixed(2)}</span>
    <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div></td>`;
}

function renderRow(row) {
  const nameCell = row.has_report
    ? `<a href="${row.report_file}" target="_blank">${row.name}</a>`
    : `<span class="no-report">${row.name}</span>`;
  const secs = row.secondaries.length
    ? row.secondaries.map(s => `<span class="tag" style="margin-left:4px">${s}</span>`).join('')
    : '';
  let cells = `<td class="name-cell">${nameCell}</td>`;
  cells += `<td><span class="tag">${row.pos_group}</span></td>`;
  cells += `<td class="num">${row.age}</td>`;
  cells += `<td><span class="tag primary">${row.primary}</span>${secs}</td>`;
  cells += renderBar(row.fit);
  for (const arch of ARCH_ORDER) {
    cells += renderBar(row.scores[arch] ?? 0);
  }
  return `<tr>${cells}</tr>`;
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = ROWS.filter(r =>
    r.name.toLowerCase().includes(query) ||
    r.primary.toLowerCase().includes(query) ||
    r.pos_group.toLowerCase().includes(query)
  );
  const sorted = sortRows(filtered);
  document.getElementById('arch-tbody').innerHTML = sorted.map(renderRow).join('');
  document.getElementById('row-count').textContent = `${sorted.length} player${sorted.length !== 1 ? 's' : ''}`;
}

function buildHeader() {
  const ths = COLS.map(([key, label]) => {
    const cls = key === sortCol ? (sortDir === -1 ? 'sorted-desc' : 'sorted-asc') : '';
    return `<th class="${cls}" data-key="${key}">${label}</th>`;
  }).join('');
  document.getElementById('arch-thead').innerHTML = `<tr>${ths}</tr>`;
  document.querySelectorAll('#arch-thead th').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (key === sortCol) { sortDir *= -1; }
      else { sortCol = key; sortDir = key === 'name' || key === 'pos_group' || key === 'primary' ? 1 : -1; }
      buildHeader();
      render();
    });
  });
}

document.getElementById('search').addEventListener('input', render);
buildHeader();
render();
</script>
