      padding: 2px 7px; border-radius: 4px; border: 1px solid var(--line-hard);

    }
    .tag.primary { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
    .role-score { margin-left: 6px; color: var(--muted); font: 700 11px var(--font-mono); }
    .bar-cell { min-width: 80px; }
    .mini-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 3px; }
    .mini-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }

ssession)", "role": "Pressing Wing-Back", "phase": "Out of Possession"}, {"id": "oop::Dropping Defensive Midfielder", "label": "Dropping Defensive Midfielder (Out of Possession)", "role": "Dropping Defensive Midfielder", "phase": "Out of Possession"}, {"id": "oop::Pressing Defensive Midfielder", "label": "Pressing Defensive Midfielder (Out of Possession)", "role": "Pressing Defensive Midfielder", "phase": "Out of Possession"}, {"id": "oop::Screening Defensive Midfielder", "label": "Screening Defensive Midfielder (Out of Possession)", "role": "Screening Defensive Midfielder", "phase": "Out of Possession"}, {"id": "oop::Wide Covering Defensive Midfielder", "label": "Wide Covering Defensive Midfielder (Out of Possession)", "role": "Wide Covering Defensive Midfielder", "phase": "Out of Possession"}, {"id": "oop::Pressing Central Midfielder", "label": "Pressing Central Midfielder (Out of Possession)", "role": "Pressing Central Midfielder", "phase": "Out of Possession"}, {"id": "oop::Screening Central Midfielder", "label": "Screening Central Midfielder (Out of Possession)", "role": "Screening Central Midfielder", "phase": "Out of Possession"}, {"id": "oop::Wide Covering Central Midfielder", "label": "Wide Covering Central Midfielder (Out of Possession)", "role": "Wide Covering Central Midfielder", "phase": "Out of Possession"}, {"id": "oop::Tracking Wide Midfielder", "label": "Tracking Wide Midfielder (Out of Possession)", "role": "Tracking Wide Midfielder", "phase": "Out of Possession"}, {"id": "oop::Wide Outlet Wide Midfielder", "label": "Wide Outlet Wide Midfielder (Out of Possession)", "role": "Wide Outlet Wide Midfielder", "phase": "Out of Possession"}, {"id": "oop::Central Outlet Attacking Midfielder", "label": "Central Outlet Attacking Midfielder (Out of Possession)", "role": "Central Outlet Attacking Midfielder", "phase": "Out of Possession"}, {"id": "oop::Splitting Outlet Attacking Midfielder", "label": "Splitting Outlet Attacking Midfielder (Out of Possession)", "role": "Splitting Outlet Attacking Midfielder", "phase": "Out of Possession"}, {"id": "oop::Tracking Attacking Midfielder", "label": "Tracking Attacking Midfielder (Out of Possession)", "role": "Tracking Attacking Midfielder", "phase": "Out of Possession"}, {"id": "oop::Inside Outlet Winger", "label": "Inside Outlet Winger (Out of Possession)", "role": "Inside Outlet Winger", "phase": "Out of Possession"}, {"id": "oop::Tracking Winger", "label": "Tracking Winger (Out of Possession)", "role": "Tracking Winger", "phase": "Out of Possession"}, {"id": "oop::Wide Outlet Winger", "label": "Wide Outlet Winger (Out of Possession)", "role": "Wide Outlet Winger", "phase": "Out of Possession"}, {"id": "oop::Central Outlet Centre Forward", "label": "Central Outlet Centre Forward (Out of Possession)", "role": "Central Outlet Centre Forward", "phase": "Out of Possession"}, {"id": "oop::Splitting Outlet Centre Forward", "label": "Splitting Outlet Centre Forward (Out of Possession)", "role": "Splitting Outlet Centre Forward", "phase": "Out of Possession"}, {"id": "oop::Tracking Centre Forward", "label": "Tracking Centre Forward (Out of Possession)", "role": "Tracking Centre Forward", "phase": "Out of Possession"}];
const ACCENT = '#1D3448';

// Column definitions: [key, label, type]  type: name|pos|tag|num|bar
const COLS = [
  ['name',    'Player',      'name'],
  ['pos_group','Position',   'pos'],
  ['age',     'Age',         'num'],
  ['playing_time', 'Agreed Playing Time', 'tag'],
  ['primary', 'Primary',     'tag'],
  ['fit',     'Primary Fit Score', 'bar'],
  ['best_ip_role', 'Best IP Role', 'tag'],
  ['best_oop_role', 'Best OOP Role', 'tag'],
  ['selected_role', 'Selected Role', 'bar'],
  ...ARCH_ORDER.map(a => [a, a, 'bar']),
];

let sortCol = 'fit', sortDir = -1;  // default: fit score descending
let selectedRoleId = '';

function selectedRoleScore(row) {
  return selectedRoleId ? (row.role_scores[selectedRoleId] ?? 0) : null;
}

function getVal(row, key) {
  if (key === 'fit') return row.fit;
  if (key === 'best_ip_role') return row.best_ip_score ?? 0;
  if (key === 'best_oop_role') return row.best_oop_score ?? 0;
  if (key === 'selected_role') return selectedRoleScore(row) ?? 0;
  if (ARCH_ORDER.includes(key)) return row.scores[key] ?? 0;
  if (key === 'pos_group') return POS_ORDER.indexOf(row.pos_group);
  if (key === 'primary') return ARCH_ORDER.indexOf(row.primary.split(' / ')[0]);
  if (key === 'age') return parseInt(row.age) || 0;
  if (key === 'playing_time') return row.playing_time_rank ?? 999;
  return (row[key] || '').toString().toLowerCase();
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    const av = getVal(a, sortCol), bv = getVal(b, sortCol);
    return typeof av === 'number'
      ? (av - bv) * sortDir
      : av.localeCompare(bv) * sortDir;
  });
}

function renderBar(val) {
  const pct = Math.round((val / 20) * 100);
  return `<td class="num bar-cell"><span>${val.toFixed(2)}</span>
    <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div></td>`;
}

function renderRow(row) {
  const nameCell = row.has_report
    ? `<a href="${row.report_file}" target="_blank">${row.name}</a>`
    : `<span class="no-report">${row.name}</span>`;
  const secs = row.secondaries.length
    ? row.secondaries.map(s => `<span class="tag" style="margin-left:4px">${s}</span>`).join('')
    : '';
  let cells = `<td class="name-cell">${nameCell}</td>`;
  cells += `<td><span class="tag">${row.pos_group}</span></td>`;
  cells += `<td class="num">${row.age}</td>`;
  cells += `<td><span class="tag">${row.playing_time || '-'}</span></td>`;
  cells += `<td><span class="tag primary">${row.primary}</span>${secs}</td>`;
  cells += renderBar(row.fit);
  cells += `<td><span class="tag">${row.best_ip_role || ''}</span><span class="role-score">${row.best_ip_score ? row.best_ip_score.toFixed(2) : ''}</span></td>`;
  cells += `<td><span class="tag">${row.best_oop_role || ''}</span><span class="role-score">${row.best_oop_score ? row.best_oop_score.toFixed(2) : ''}</span></td>`;
  const roleScore = selectedRoleScore(row);
  cells += roleScore === null ? '<td></td>' : renderBar(roleScore);
  for (const arch of ARCH_ORDER) {
    cells += renderBar(row.scores[arch] ?? 0);
  }
  return `<tr>${cells}</tr>`;
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const roleQuery = document.getElementById('role-search').value.trim();
  const selectedOption = ROLE_OPTIONS.find(role => role.label.toLowerCase() === roleQuery.toLowerCase());
  selectedRoleId = selectedOption ? selectedOption.id : '';
  const filtered = ROWS.filter(r =>
    r.name.toLowerCase().includes(query) ||
    r.primary.toLowerCase().includes(query) ||
    r.pos_group.toLowerCase().includes(query) ||
    (r.best_ip_role || '').toLowerCase().includes(query) ||
    (r.best_oop_role || '').toLowerCase().includes(query) ||
    (r.playing_time || '').toLowerCase().includes(query)
  );
  const sorted = sortRows(filtered);
  document.getElementById('arch-tbody').innerHTML = sorted.map(renderRow).join('');
  document.getElementById('row-count').textContent = `${sorted.length} player${sorted.length !== 1 ? 's' : ''}`;
}

function buildHeader() {
  const ths = COLS.map(([key, label]) => {
    const cls = key === sortCol ? (sortDir === -1 ? 'sorted-desc' : 'sorted-asc') : '';
    return `<th class="${cls}" data-key="${key}">${label}</th>`;
  }).join('');
  document.getElementById('arch-thead').innerHTML = `<tr>${ths}</tr>`;
  document.querySelectorAll('#arch-thead th').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (key === sortCol) { sortDir *= -1; }
      else { sortCol = key; sortDir = key === 'name' || key === 'pos_group' || key === 'primary' || key === 'playing_time' ? 1 : -1; }
      buildHeader();
      render();
    });
  });
}

document.getElementById('search').addEventListener('input', render);
const roleSearch = document.getElementById('role-search');
document.getElementById('role-options').innerHTML = ROLE_OPTIONS
  .map(role => `<option value="${role.label}"></option>`)
  .join('');
roleSearch.addEventListener('input', () => {
  const match = ROLE_OPTIONS.find(role => role.label.toLowerCase() === roleSearch.value.trim().toLowerCase());
  if (match) {
    sortCol = 'selected_role';
    sortDir = -1;
    buildHeader();
  }
  render();
});
document.getElementById('clear-role').addEventListener('click', () => {
  roleSearch.value = '';
  render();
});
buildHeader();
render();
</script>
